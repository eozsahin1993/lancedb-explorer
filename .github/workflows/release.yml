name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            os: darwin
            cpu: arm64
            libc: glibc
          - target: linux-x64
            os: linux
            cpu: x64
            libc: glibc
          - target: linux-arm64
            os: linux
            cpu: arm64
            libc: glibc
          - target: alpine-x64
            os: linux
            cpu: x64
            libc: musl
          - target: alpine-arm64
            os: linux
            cpu: arm64
            libc: musl
          - target: win32-x64
            os: win32
            cpu: x64
            libc: glibc
          - target: win32-arm64
            os: win32
            cpu: arm64
            libc: glibc
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build

      # vsce package always reruns `npm run build` internally, which needs
      # esbuild. Back it up before the prod-only reinstall below strips it.
      - name: Back up esbuild
        run: |
          cp -R node_modules/esbuild /tmp/esbuild-backup
          cp -R node_modules/@esbuild /tmp/esbuild-scoped-backup

      # Reinstall production deps only, overriding os/cpu/libc so npm resolves
      # the @lancedb/lancedb-* native binary package for the release target,
      # regardless of this runner's actual platform.
      - name: Install target-specific runtime dependencies
        run: npm ci --omit=dev --os=${{ matrix.os }} --cpu=${{ matrix.cpu }} --libc=${{ matrix.libc }}

      # Restore via plain file copy, not `npm install` -- npm install
      # unconditionally re-resolves optionalDependencies for the *runner's*
      # actual platform (always linux-x64 here, regardless of matrix.target),
      # which would silently re-add this runner's own @lancedb/lancedb-*
      # binary alongside the target one just pruned in above, bloating every
      # non-linux-x64 package with an extra ~150MB native binary it doesn't
      # need. A file copy touches nothing else in node_modules.
      - name: Restore esbuild for this runner
        run: |
          rm -rf node_modules/esbuild node_modules/@esbuild
          cp -R /tmp/esbuild-backup node_modules/esbuild
          cp -R /tmp/esbuild-scoped-backup node_modules/@esbuild

      - name: Package extension
        run: npx vsce package --target ${{ matrix.target }} --out lancedb-explorer-${{ github.ref_name }}-${{ matrix.target }}.vsix

      - uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
          path: "*.vsix"

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.vsix
          generate_release_notes: true

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: marketplace-publish
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # vsce (a devDependency) is needed to run the publish command itself;
      # the actual per-target packages below are the pre-built .vsix files,
      # not a fresh package built by this step.
      - name: Install dependencies
        run: npm ci

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # OIDC federated login via the vscode-publisher user-assigned managed
      # identity -- no stored client secret. Its federated credential is
      # scoped to this job's "environment:" value above, and it's added as a
      # Contributor member of the Marketplace publisher by resource ID (not
      # the client ID) -- a plain Entra ID app registration/service
      # principal doesn't work here, only a managed identity is recognized.
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Publish to VS Code Marketplace
        run: npx vsce publish --packagePath artifacts/*.vsix --skip-duplicate --azure-credential
